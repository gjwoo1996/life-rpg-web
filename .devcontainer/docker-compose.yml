services:
  workspace:
    # image: mcr.microsoft.com/devcontainers/base:ubuntu
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    env_file:
      - ../.env
    environment:
      # Common_Repo stack on external network gw-shared-devnet (postgres, ollama)
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
      - TZ=Asia/Seoul
    volumes:
      - ..:${containerWorkspaceFolder}:cached
      - claude-config:/home/node/.claude
    ports:
      - "3000:3000"   # Next.js
      - "3001:3001"   # NestJS API
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - shared-devnet

volumes:
  claude-config:

networks:
  shared-devnet:
    external: true
    name: gw-shared-devnet
